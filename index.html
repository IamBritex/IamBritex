<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <title>Just Britex</title>
  <link rel="stylesheet" href="styles.css">

<body id="phaser-cam-fx">
  <div class="center-container">
    <div class="card">
      <div class="card-title">HEY THERE! I'm Britex</div>
      <div class="card-subtitle">
        <span>Developer</span>
        <span class="dot"></span>
        <span>Youtuber</span>
        <span class="dot"></span>
        <span>Student</span>
      </div>
      <div class="card-buttons">
        <button title="About">
          <span class="material-symbols-outlined">emoji_people</span>
          <span>About</span>
        </button>
        <button title="Links">
          <span class="material-symbols-outlined">link</span>
          <span>Links</span>
        </button>
        <button title="Work">
          <span class="material-symbols-outlined">work</span>
          <span>Work</span>
        </button>
        <button title="Faq">
          <span class="material-symbols-outlined">help</span>
          <span>Faq</span>
        </button>
        <button title="Contact">
          <span class="material-symbols-outlined">mail</span>
          <span>Contact</span>
        </button>
      </div>
    </div>
  </div>

  <div id="character-container">
    <img id="character-gif" src="assets/sprites/bloggif_frames_gif/frame-01.gif" alt="Character">
  </div>

  <div id="phaser-cam-fx" style="position:fixed;left:0;top:0;width:100vw;height:100vh;pointer-events:none;z-index:1;"></div>

  <div id="modal" class="modal" style="display:none;">
    <div class="modal-content" id="modalContent">
      <div id="modalHeader" style="cursor: move; user-select: none;">
        <span class="close-modal" id="closeModal">&times;</span>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <footer>
